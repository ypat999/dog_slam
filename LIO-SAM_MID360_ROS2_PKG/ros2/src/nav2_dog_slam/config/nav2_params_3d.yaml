# =============================================================================
# Behavior Server Configuration - 恢复行为
# =============================================================================
behavior_server:
  ros__parameters:
    use_sim_time: false
    
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    footprint_topic: "/local_costmap/published_footprint"
    cycle_frequency: 20.0
    robot_base_frame: "base_footprint"
    simulate_ahead_time: 0.0
    
    collision_checker:
      costmap_admissible_threshold: 1.0
    
    # 旋转行为
    spin:
      plugin: "nav2_behaviors/Spin"
      spin_dist: 1.57
      max_rotational_vel: 1.0
      min_rotational_vel: 0.5
      rotational_acc_lim: 5.0
      
    # 后退行为
    backup:
      plugin: "nav2_behaviors/BackUp"
      backup_dist: 0.5
      backup_speed: 0.15
      acceleration_limit: 1.5
      deceleration_limit: -2.0
      minimum_speed: 0.1
      
    # 方向驱动行为
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
      min_dist: 0.2
      max_dist: 0.8
      max_speed: 0.5
      min_speed: 0.11
      min_theta_error: 0.1
      max_theta_error: 0.3
      speed_theta_error_scale: 0.3
      simulation_duration: 0.0
      rotate_to_heading: false
      
    # 等待行为
    wait:
      plugin: "nav2_behaviors/Wait"
      wait_duration: 2.0