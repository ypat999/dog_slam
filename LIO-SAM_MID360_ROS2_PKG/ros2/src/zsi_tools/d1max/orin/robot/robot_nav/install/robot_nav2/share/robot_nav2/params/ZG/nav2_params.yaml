    r2: 0.06
    p_s: 0.85
    smoothing_window: 3
    d2_quantile: 0.99
    warmup_trace_threshold: 10.0

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    debug: True
    use_sim_time: False
    multi_path_selector:
      # Global settings
      default_timeout_ms: 50.0
      enable_fast_pruning: True
      max_candidate_paths: 10
      min_candidate_paths: 2

      # Default scoring weights (must sum to ~1.0)
      default_weights:
        safety_weight: 0.3
        reference_deviation_weight: 0.3
        smoothness_weight: 0.20
        efficiency_weight: 0.15
        kinematic_feasibility_weight: 0.05

      # Fast pruner configuration
      fast_pruner:
        min_obstacle_distance: 0.15   # Minimum distance to obstacles (m)
        max_path_length: 10.0         # Maximum reasonable path length (m)
        max_curvature: 3.0            # Maximum allowed curvature (1/m)
        max_avg_curvature: 1.0        # Maximum average allowed curvature (1/m)
        min_point_separation: 0.1     # Minimum distance between path points (m)
        min_path_points: 3            # Minimum number of points in path
        collision_check_step: 1       # Step size for collision checking
        robot_radius: 0.35            # Robot radius for collision checking (m)

      # Safety critic configuration
      safety_critic:
        robot_radius: 0.35
        safe_distance_threshold: 0.8       # Distance considered "safe" (m)
        critical_distance_threshold: 0.40  # Distance considered "critical" (m)
        clearance_scaling_factor: 2.0      # Scaling for clearance-to-score conversion
        path_sampling_step: 1              # Step size for path point sampling

      # Reference deviation critic configuration
      reference_deviation_critic:
        max_lateral_deviation: 1.0       # Maximum acceptable lateral deviation (m)
        max_heading_deviation: 1.57      # Maximum acceptable heading deviation (rad, ~90 deg)
        lateral_weight: 0.7              # Weight for lateral deviation component
        heading_weight: 0.2              # Weight for heading deviation component
        endpoint_weight: 0.1             # Weight for endpoint deviation component
        normalize_by_path_length: True   # Whether to normalize by path length
        deviation_scaling_factor: 1.5    # Scaling factor for score conversion

      # Smoothness critic configuration 
      smoothness_critic:
        max_acceptable_curvature: 0.65       # Maximum acceptable curvature (1/m)
        max_acceptable_acceleration: 2.0     # Maximum acceptable acceleration (m/s^2）
        max_acceptable_angular_accel: 2.0    # Maximum angular acceleration (rad/s^2)
        curvature_weight: 0.4                # Weight for curvature component
        acceleration_weight: 0.3             # Weight for acceleration component
        angular_acceleration_weight: 0.2     # Weight for angular acceleration
        variation_weight: 0.1                # Weight for curvature variation component
        expected_velocity: 1.0               # Expected robot velocity for time estimation
        sharp_turn_threshold: 1.0            # Curvature threshold for sharp turn detection
        penalize_sharp_turns: true           # Whether to penalize sharp turns

      # Efficiency critic configuration
      efficiency_critic:
        expected_velocity: 1.0                # Expected robot velocity (m/s)
        length_weight: 0.4                    # Weight for path length component
        time_weight: 0.3                      # Weight for travel time component
        energy_weight: 0.2                    # Weight for energy cost component
        directness_weight: 0.1                # Weight for directness component
        max_acceptable_length: 10.0           # Maximum acceptable path length (m)
        max_acceptable_time: 10.0             # Maximum acceptable travel time (s)
        use_different_goals_evaluation: True  # Whether to evaluate multiple goals
        max_projection_distance: 5.0          # Maximum distance for projection (m)
        endpoint_tolerance: 1.0               # Allowed endpoint tolerance (m)

      # Kinematic feasibility critic configuration
      kinematic_feasibility_critic:
        min_turning_radius: 2.0           # Minimum turning radius for quadruped (m)
        max_turning_radius: 100.0         # Maximum reasonable turning radius (m)
        max_slope_angle: 0.5              # Maximum slope angle (~28 degrees, rad)
        max_velocity: 2.0                 # Maximum robot velocity (m/s)
        max_linear_acceleration: 2.0      # Maximum linear acceleration (m/s^2)
        max_lateral_acceleration: 2.0     # Maximum lateral acceleration (m/s^2)
        check_slope_constraints: False    # Whether to check slope constraints
        check_turning_constraints: True   # Whether to check turning constraints

