    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: True
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.2
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

local_costmap:
  local_costmap:
    ros__parameters:
      odom_topic: /odom/current_pose
      update_frequency: 10.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: True
      width: 8
      height: 8
      resolution: 0.05
      plugins: [ "obstacle_layer", "electronic_map_layer", "inflation_layer" ]
      electronic_map_layer:
        plugin: "navigo_costmap_2d::ElectronicMapLayer"
        enabled: True
        electronic_map_topic: "/electronic_map"
        transform_tolerance: 0.1
        debug_mode: False
      inflation_layer:
        plugin: "navigo_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.05
      obstacle_layer:
        plugin: "navigo_costmap_2d::ObstacleLayer"
        enabled: True
        goal_safe_area: "[[0.40,0.4],[0.4,-0.4],[-0.4,-0.4],[-0.4,0.4]]"
        goal_clearing_enabled: True
        footprint_clearing_enabled: True
        planner_goal_valid_time_range: 5.0
        observation_persistence: 0.0
        observation_sources: scan
        scan:
          topic: /laser_scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          inf_is_valid: True
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          obstacle_max_range: 8.5
          obstacle_min_range: 0.5
      always_send_full_costmap: True
  local_costmap_client:
    ros__parameters:
      use_sim_time: False
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

