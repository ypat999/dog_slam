behavior_server:
  ros__parameters:
    odom_topic: /odom/current_pose
    costmap_topic: /navigo/lcc/cmn/vis/costmap_raw
    footprint_topic: /navigo/lcc/cmn/vis/published_footprint
    track_unknown_space: False
    cycle_frequency: 10.0
    behavior_plugins: [ "spin", "backup", "drive_on_heading", "wait" ]
    spin:
      plugin: "navigo_behaviors/Spin"
    backup:
      plugin: "navigo_behaviors/BackUp"
    drive_on_heading:
      plugin: "navigo_behaviors/DriveOnHeading"
    wait:
      plugin: "navigo_behaviors/Wait"
