planner_server:
  ros__parameters:
    odom_topic: /odom/current_pose
    use_sim_time: False
    expected_planner_frequency: 20.0
    # extension line
    need_extension: False
    extension_dis: 0.5
    extension_step_size: 0.05
    # planning path generation format
    use_fixed_spacing_trajectory_generation: True
    use_history_path_info: False
    # tracking function 
    fov_near_goal_dist: 5.0
    out_of_fov_threshold: 20.0
    # collision checker
    use_esdf_collision_checker: False
    three_circle_check_margin: 0.03
    three_circle_fine_check_sample_res: 0.05
    # pp + fem get optimized path
    enable_pp_fem_debug_output: False
    # esdf info
    build_global_esdf_map: True
    build_local_esdf_map: True
    global_esdf_visualizer_open: False
    local_esdf_visualizer_open: False
    global_esdf_build_timeout: 10.0
    # 3D Topological Map info
    topo_map_pcd_file: ""
    global_3d_topo_build_timeout: 60.0 #s
    # Parallel planning configuration
    enable_parallel_planning: True
    max_parallel_goals: 5
    parallel_planning_timeout: 3.0
    # Log level set ["DEBUG" "INFO"]
    log_level: "DEBUG"
    # quadtree info
    quadtree:
      enable: True
      min_box_size: 4
      max_box_size: 100
      robot_radius_m: 0.1
    # corridor optimizer  
    preprocessor:
      dup_threshold: 0.1
      backtrack_angle_threshold: 2.618
      loop_distance_threshold: 2.0
      min_loop_points: 5
      sharp_turn_angle_threshold: 2.09
      sharp_turn_detection_window: 3.0
      enable_sharp_turn_detection: true
    corridor_builder:
      robot_radius: 0.35
      safety_margin: 0.15
      min_corridor_width: 0.5
      sample_distance: 0.2
      max_search_distance: 3.0
    # fem optimizer
    fem_opt:
      enable_fem_debug_switch: False
      enable_two_sided_constraint: True
      point_deviation_limits: 2.0
      enable_kappa_constraint: False
      osqp_weight_fem_pos_deviation: 10000.0
      osqp_weight_path_length: 1000.0
      osqp_weight_ref_deviation: 1.0
      sqp_weight_curvature_constraint_slack_var: 10000.0
      sqp_curvature_constraint: 0.10
      sqp_weight_fem_pos_deviation: 1000000.0
      sqp_weight_path_length: 1.0
      sqp_weight_ref_deviation: 10.0
    planner_plugins: [ "GridBasedST", "GridBasedSL", "ThreeDimTopoBased" ]
    GridBasedST:
      plugin: "navigo_spatial_temporal_planner/SpatialTemporalPlanner"
      # kino hybrid astar searcher
      kino_search:  
        step_arc: 0.9
        max_search_time: 2.0
        adaptive_timeout_base: 0.5
        max_forward_vel: 2.0
        max_forward_acc: 0.5
        max_backward_vel: 2.0
        max_backward_acc: 0.5
        max_yaw_acc: 1.0
        obstacle_safety_dist: 3.0
        omni_model_expansion_res: 0.5
        omni_model_dis_threshold: 6.0
        omni_model_yaw_expansion_res: 0.5
        omni_model_near_max_yaw_rate: 1.0
        omni_model_near_lateral_max_vel: 1.0
        omni_model_near_longitudinal_max_vel: 1.0
        omni_model_far_max_yaw_rate: 2.0
        omni_model_far_lateral_max_vel: 2.0
        omni_model_far_longitudinal_max_vel: 3.0
        trigger_shot_dis: 3.0
        check_num: 10
        allocate_num: 10000
        check_length: 0.05
        sample_time: 0.2
        max_cur: 5.0 #5.773
        wheel_base: 0.3
        non_singularity_vel: 0.1
        lambda_heu: 10.0
        traj_steer_penalty: 10.0
        traj_back_penalty: 20.0
        traj_forward_penalty: 1.0
        traj_gear_switch_penalty: 15.0
        traj_steer_change_penalty: 10.0
        traj_lateral_penalty: 10.0
        traj_ctrl_change_penalty: 5.0
        traj_spin_penalty: 10.0
        # new penalty
        switch_time: 1.0
        move_weight: 1.0
        backward_weight: 5.0
        acc_weight: 1.0
        yaw_acc_weight: 1.0
        yaw_weight: 2.0
        lateral_weight: 1.0
        switch_weight: 5.0
        node_deviation_weight: 5.0
        obstacle_dist_weight: 5.0
        map_resolution: 0.3
        yaw_resolution: 0.3
        rear_suspension: 0.15
        robot_width: 0.3
        robot_length: 0.6
        robot_lateral_margin: 0.05
        robot_longitudinal_margin: 0.05
        robot_left_margin: 0.05
        robot_right_margin: 0.05
        robot_front_margin: 0.05
        robot_back_margin: 0.05
        map_size_x: 500
        map_size_y: 500
        consider_lateral_move: True
        allow_reverse_expansion: False
        open_expansion_visualization: False
        # multiple points sample
        enable_start_goal_sampling: false
        sampling_radius: 10.0
        sampling_angle_range: 1.0
        num_sampling_points: 30
        max_connecting_path_length: 12.0
        # support model: "OmniMotionModel", "AckermannMotionModel"  
        enabled_motion_models: ["OmniMotionModel"] 
        use_3d_search: true   # enbale 3D search (x, y, yaw)                                                                                  │ │
        use_2d_search: false  # enable 2D search (x, y only)  
      # quadtree searcher
      quadtree_search:
        max_forward_vel: 1.0
        max_forward_acc: 2.0
        max_backward_vel: 0.6
        max_backward_acc: 4.0
        non_singularity_vel: 0.1
        sample_time: 0.2
        wheel_base: 0.3
        path_yaw_smooth_window_size: 5
        rear_suspension: 0.15
        robot_width: 0.3
        robot_length: 0.6
        robot_lateral_margin: 0.05
        robot_longitudinal_margin: 0.05
        allow_reverse_expansion: False
        enable_footprint_safety_check: False
        safety_offset_search_radius: 0.3
        safety_offset_resolution: 0.05
        max_path_adjustment_attempts: 3
        enable_footprint_visualization: True
        enable_path_visualization: True
        enable_multi_inflation_search: True
        inflation_sample_count: 7
        inflation_sampling_strategy: "adaptive"
        max_search_time_per_inflation_ms: 150.0
        enable_multi_inflation_visualization: True
        min_acceptable_inflation: 0.01
        prefer_higher_inflation: True
        cost_tolerance_ratio: 1.5
        enable_multi_inflation_fallback: True
      # tracking searcher
      tracking_search:
        tracking_max_tau: 0.6
        tracking_max_vel: 3.0
        tracking_max_acc: 3.0
        tracking_w_time: 10.0
        tracking_lambda_heu: 5.0
        tracking_check_num: 5
        tracking_w_predict: 0.5
        tracking_allocate_num: 5000
        tracking_map_size_x: 200
        tracking_map_size_y: 200
        tracking_map_res: 0.1
        tracking_shot_path_collision_res: 0.05
        max_search_time: 1.0
        polynomial_with_backend_opt: False
        robot_width: 0.3
        robot_length: 0.6
        robot_left_margin: 0.05
        robot_right_margin: 0.05
        robot_front_margin: 0.05
        robot_back_margin: 0.05
      # fast kino searcher
      fast_kino_search:
        max_nodes: 50000
        max_search_time: 0.04
        collision_check_steps: 2
        max_linear_vel: 2.0
        max_lateral_vel: 1.5
        max_diagonal_vel: 1.8
        max_angular_vel: 1.0
        motion_dt: 0.2
        coarse_resolution: 0.4
        fine_resolution: 0.2
        resolution_switch_dist: 3.0
        map_resolution: 0.1
        robot_radius: 0.3
        robot_width: 0.3
        robot_length: 0.6
        max_forward_vel: 2.0
        max_forward_acc: 2.0
        max_backward_vel: 0.6
        max_backward_acc: 2.0
        non_singularity_vel: 1.0
      # Hybrid quadtree kino searcher
      hybrid_quadtree_kino_search:
        max_guidance_distance: 3.0
        progression_bonus_weight: 1.5
        obstacle_density_weight: 0.5
        max_search_attempts: 1
        enable_adaptive_fallback: true
        enable_obstacle_aware_guidance: true
        enbale_guidance_visualization: false
      # safe drive corridor
      safe_drive_corridor:
        safe_drive_corridor_expand_step: 0.10
        safe_drive_corridor_expand_limit_bound: 2.0
        short_traj: 5.0
        traj_piece_duration_low: 1.0
        middle_traj: 10.0
        traj_piece_duration_middle: 2.0
        traj_piece_duration_large: 4.0
        side_piece_res: 20
        inter_piece_res: 10
        safe_corridor_obstacle_margin: 0.5
        safe_corridor_use_dynamic_shrink: False
        safe_corridor_min_expansion_ratio: 0.3
        min_corridor_clearance: 0.5
        max_clearance_adjustment_iters: 10
        enable_clearance_visualization: False
        corridor_generation_strategy: "uniform"
        adaptive_far_distance_threshold: 0.8
        adaptive_medium_distance_threshold: 0.6
        adaptive_near_distance_threshold: 0.3
        adaptive_far_expansion_factor: 1.0
        adaptive_medium_expansion_factor: 0.7
        adaptive_near_expansion_factor: 0.4
        adaptive_enable_trajectory_adjustment: False
        adaptive_trajectory_adjustment_step: 0.05
        adaptive_max_adjustment_iters: 10
      # back-end optimizer
      spatial_temporal_backend_opt:
        wheel_base: 0.3
        rear_suspension: 0.15
        robot_width: 0.3
        robot_length: 0.6
        max_forward_cur: 5.0
        max_backward_cur: 5.0
        max_forward_vel: 2.0
        max_forward_acc: 0.5
        max_backward_vel: 2.0
        max_backward_acc: 0.5
        non_singularity_vel: 0.1
        wei_cur: 1.0
        wei_time: 500.0
        wei_static_obs: 5000.0
        wei_dynamic_obs: 1000.0
        wei_feasibility: 200.0
        maximum_acceptable_cost: 500000.0
        dynamic_safety_dis: 0.1
        use_gear_opt: False
        eps_help: 0.0001
        minimum_time: 0.1
        log_sum_exp_alpha: 100.0
        half_margin: 0.025
        side_piece_res: 20
        inter_piece_res: 10
        # lbfgs
        lbfgs_past: 3
        lbfgs_delta: 0.005
        lbfgs_min_step: 1.0e-16
        lbfgs_mem_size: 64
        lbfgs_max_iter: 500
        lbfgs_g_epsilon: 1.0e-5
        # Two-stage optimization
        enable_two_stage_optimization: True
        stage1_max_iter: 40
        stage2_max_iter: 30
        stage1_g_epsilon: 1.0e-3
        stage2_g_epsilon: 1.0e-5
        stage1_weight_scale: 0.3
    GridBasedSL:
      plugin: "navigo_straight_line_planner/StraightLinePlanner"
      allow_reversing: True
      traj_res: 0.05
      # extension line
      extension_dis: 4.0
      extension_step_size: 0.1
      uwb_nav_mode_safety_threshold: 0.8
    ThreeDimTopoBased:
      plugin: "navigo_3d_topo_global_planner/Navigo3DTopoGlobalPlanner"
      # Map file configuration
      global_frame: "map"
      pcd_map_file: ""  # Set to your PCD file path
      # 3D Topological Map parameters
      safety_margin: 0.1
      octree_resolution: 0.2
      esdf_resolution: 0.05
      robot_footprint_x: 0.6
      robot_footprint_y: 0.3
      max_climbing_height: 0.3
      max_drop_height: 2.0
      planning_timeout_ms: 5000.0
      max_search_nodes: 50000
      max_search_dis_for_find_nearest_node: 1.0
      connect_to_nodes_factor: 2.0
      min_points_per_voxel: 5
      min_neighbors_for_filter_nodes: 5
      min_surface_node_points: 5
      max_isolation_dist_for_filter_nodes: 0.5
      safety_traversability_score: 40.0
      surface_node_check_radius: 0.2
      use_obstacle_avoidance: False
      path_smoothing: True
      search_algorithm: "astar"  # Options: "astar", "dijkstra"
      # Intensity interpretation
      pcd_intensity_mode: "normalized"  # Options: "none", "normalized", "legancy"
      normalized_safety_threshold: 1.0
      # Centerline guidance
      enable_centerline_guidance: False
      centerline_layer_height: 0.1
      centerline_grid_resolution: 0.05
      centerline_boundary_expansion: 0.2
      centerline_min_width: 0.1
      centerline_use_thinning: True
      centerline_thinning_iterations: 10
      centerline_penalty_weight: 0.3
      # Neighbor density safety
      neighbor_penalty_weight: 5.0
      safe_neighbor_count: 50
      # Cost weights
      heuristic_weight: 1.0
      base_distance_weight: 0.1
      traversability_weight: 100.0
      climbing_weight: 50.0
      roughness_weight: 1.5
      enable_cost_logging: False
      # ESDF integration
      use_esdf_for_planning: False
      esdf_weight: 50.0
      esdf_obstacle_clearance: 0.8
      esdf_pcd_mode: "normalized"  # Options: "normalized", "legancy"
      # Boundary wall detection
      enable_boundary_walls: False
      virtual_wall_height: 1.0
      use_morphological_closing: False
      closing_kernel_size: 1
      extrude_only_horizontal_edges: False
      # Visualization
      enable_visualization: True
      show_search_path: True
      show_pcd_overlay: True
      # Connectivity analysis
      verbose_logging: True
      enable_connectivity_check: True
      default_min_component_size: 50
      num_components_found_threshold: 10
      max_analysis_time_ms: 100.0

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    odom_topic: "/odom/current_pose"
    use_sim_time: False
    mc_controller_type: RL_TRACK_VELOCITY
    controller_frequency: 50.0
    mc_trajectory_size: 20
    min_x_velocity_threshold: 0.05
    min_y_velocity_threshold: 0.05
    min_theta_velocity_threshold: 0.05
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: [ "general_goal_checker" ] # "precise_goal_checker"
    controller_plugins: [ "FollowPathPP", "FollowPathPID", "FollowPathLocalPlanner" ]

    # Progress checker parameters
    progress_checker:
      plugin: "navigo_path_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    # Goal checker parameters
    general_goal_checker:
      plugin: "navigo_path_controller::SimpleGoalChecker"

    # PP parameters
    FollowPathPP:
      plugin: "navigo_pure_pursuit_controller::PurePursuitController"
      ### UWB PARAMETER ###
      use_multiple_vel_mode: True
      multiple_vel_mode_threshold_dist: 3.0
      uwb_desired_high_linear_vel_x: 2.0 # 2.0 1.0
      uwb_desired_high_linear_vel_y: 1.0 # 1.0 0.7
      uwb_desired_linear_vel_x: 1.0 # 1.0 1.0
      uwb_desired_linear_vel_y: 0.5 # 0.5 0.5
      uwb_desired_low_linear_vel_x: 1.0 # 1.0 0.5
      uwb_desired_low_linear_vel_y: 0.5 # 0.5 0.35
      uwb_nav_mode_safety_threshold: 0.8
      uwb_nav_mode_switch_threshold: 2.0
      uwb_nav_mode_switch_tolerance: 0.2
      ### COMMON PARAMETER BOOL ###
      allow_reversing: False
      interpolate_curvature_after_goal: False
      use_cancel_deceleration: False
      use_collision_detection: False
      use_cost_regulated_linear_velocity_scaling: False
      use_fixed_curvature_lookahead: False
      use_omnidirectional_model: False
      use_regulated_linear_velocity_scaling: True
      use_trajectory_distance_lookahead: True
      use_velocity_scaled_lookahead_dist: True
      ### COMMON PARAMETER DOUBLE ###
      approach_velocity_scaling_dist: 2.0
      braking_decel_far: 1.0
      braking_decel_near: 0.2
      braking_switch_vel: 0.5
      cancel_deceleration: 3.2
      cost_scaling_dist: 0.3
      cost_scaling_gain: 1.0
      curvature_adaptive_factor: 0.2
      curvature_lookahead_dist: 1.0
      inflation_cost_scaling_factor: 3.0
      max_allowed_time_to_collision_up_to_carrot: 1.0
      max_angular_accel: 3.2
      max_path_length: 2.0
      max_prediction_collision_check_dist: 6.0
      max_robot_pose_search_dist: 10.0
      min_approach_linear_velocity: 0.1
      min_prediction_collision_check_dist: 2.0
      min_speed_scale: 0.9
      omnidirectional_model_kv: 3.0
      omnidirectional_model_kw: 2.0
      omnidirectional_model_lamda_l: 0.6
      omnidirectional_model_lamda_theta: 0.4
      prediction_step_size: 0.5
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.1
      rotate_to_heading_Kd: 0.2
      rotate_to_heading_Kp: 1.0
      rotate_to_heading_angular_vel_max: 1.2
      rotate_to_heading_angular_vel_min: 0.1
      rotate_to_heading_approach_zone_margin: 0.2
      rotate_to_heading_stop_zone_ratio: 0.9
      rotate_to_path_heading_tol: 0.524
      trajectory_distance_weight: 1.0
      transform_tolerance: 0.1
      ### COMMON PARAMETER INT ###
      prediction_direction_num: 11

    # MPPI parameters
    FollowPathMPPI:
      plugin: "navigo_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000
      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.4
      vx_max: 1.5 #0.5
      vx_min: -1.5 #-0.35
      vy_max: 0.5 #0.5
      wz_max: 1.9
      ax_max: 2.0
      ay_max: 2.0
      ax_min: -2.0
      az_max: 2.0
      iteration_count: 1
      prune_distance: 2.0   #1.7
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015 #0.015
      motion_model: "DiffDrive"
      visualize_all_sampled_traj: False
      visualize_optimized_traj: True
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstraints:
        min_turning_r: 0.1667
      critics: [ "ConstraintCritic", "CostCritic", "GoalCritic", "PathAlignCritic", "GoalAngleCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic" ] #
      ConstraintCritic:
        enabled: True
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: True
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: True
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: True
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      CostCritic:
        enabled: True
        cost_power: 2
        cost_weight: 3.81
        critical_cost: 300.0
        consider_footprint: True
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: True
        cost_power: 1
        cost_weight: 14.0 #14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: False
      PathFollowCritic:
        enabled: True
        cost_power: 1
        cost_weight: 5.0 # 25
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: True
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0
        forward_preference: True

    # PID Controller parameters (for precise goal reaching)
    FollowPathPID:
      plugin: "navigo_pid_controller::PIDController"

      # X axis PID parameters
      x_pid:
        kp: 1.5
        ki: 0.05
        kd: 0.2
        windup_limit: 2.0
        output_limit: 0.5

      # Y axis PID parameters
      y_pid:
        kp: 1.5
        ki: 0.05
        kd: 0.2
        windup_limit: 2.0
        output_limit: 0.5

      # Yaw axis PID parameters
      yaw_pid:
        kp: 1.0
        ki: 0.02
        kd: 0.15
        windup_limit: 1.0
        output_limit: 1.5

      # Minimum velocity thresholds (prevent oscillation)
      min_linear_x_velocity: 0.01   # m/s
      min_linear_y_velocity: 0.01   # m/s
      min_angular_velocity: 0.01  # rad/s

    # FollowPathLocalPlanner Controller parameters
    FollowPathLocalPlanner:
      plugin: "navigo_local_planner_controller::LocalPlannerController"
      plugin: "navigo_local_planner_controller::LocalPlannerController"
      enable_footprint_check: true
      enable_footprint_visualization: true
      comparison_path_topic: "/navigo/cs/lpc/vis/base_candidate_plan"
      footprint_collision_marker_topic: "/navigo/cs/lpc/vis/footprint_collision"
      footprint_samples_marker_topic: "/navigo/cs/lpc/vis/footprint_samples"
      footprint_marker_z: 0.02
      footprint_collision_marker_size: 0.1
      footprint_samples_line_width: 0.02
      footprint_points: [ 0.5, 0.2, 0.5,-0.2, -0.5, -0.2, -0.5, 0.2 ]
      robot_length: 1.2
      robot_width: 0.6
      max_path_length: 1.0
      adjacent_range: 1.8
      min_path_range: 0.8
      search_radius: 0.25
      yaw_p_gain: 1.2
      small_yaw_gain: 1.68
      slow_down_dis_thre: 1.0
      max_linear_vel: 0.6
      max_linear_accel: 0.6
      max_angular_accel: 3.5
      max_angular_vel: 0.6
      yaw_diff_thre: 0.45
      forward_only_angle_thre: 20.0
      allow_rear_range: 0.8  #m
      allow_rear_thre: 150.0
      reverse_angle_thre: 120.0
      vel_y_gain: 0.5
      vel_x_gain: 1.0
      lookahead_distance: 1.0
      two_way_drive_mode: false
      goal_path_dir_weight: 0.01
      trajectory_smooth_weight: 0.3
      stop_dis_thre: 0.5
      reverse_speed_ratio: 0.1
      u_turn_speed_ratio: 0.6
      use_omni_mode: false
      lidar_min_range: 0.15
      lidar_range_margin: 3.5
      footprint_collision_min_points: 3
      control_frequency: 50.0
      min_yaw_dead_zone: 0.3
      enable_dynamic_parameters: true

    # SocialMPC parameters
    FollowPathMPC:
      plugin: "navigo_social_mpc_controller::SocialMPCController"
      ### COMMON PARAMETERS ###
      desired_linear_vel: 1.0 # 0.6
      transform_tolerance: 0.1
      controller_frequency: 20.0 # actually not used
      goal_dist_tol: 0.25
      max_robot_pose_search_dist: 10.0
      reject_unit_path: true
      cmd_vel_output_path: "/home/user/cmd_vel_log.txt"
      ### TRAJECTORIZER PARAMETERS ###
      trajectorizer:
        omnidirectional: false
        desired_linear_vel: 1.0 # 0.4 WARNING!
        lookahead_dist: 2.0
        max_angular_vel: 1.4
        transform_tolerance: 0.1 # WARNING!
        base_frame: "base_link"
        time_step: 0.05
        max_time: 2.0 # sec
      ### CERES OPTIMIZER PARAMETERS ###
      optimizer:
        linear_solver_type: "DENSE_QR"
        param_tol: 1.0e-5 # 1e-9
        fn_tol: 1.0e-4 # 1e-5
        gradient_tol: 1.0e-4 # 1e-8
        max_iterations: 20 # 30, 60
        debug_optimizer: false
        control_horizon: 30
        parameter_block_length: 6
        discretization: 1
        current_path_weight: 1.0
        current_cmds_weight: 0.5
        ### CRITICS WEIGHTS ###
        weights:
          # Social costs
          social_weight: 0.0 # commented
          proxemics_weight: 900.0 # normal 90. large 900
          agent_angle_weight: 0.0 # commented
          # Non-Social costs
          distance_weight: 100.0 # desired goal position aligning, 20.0
          goal_align_weight: 100.0 # desired goal heading aligning, 10.0
          velocity_weight: 50.0 # desired velocity tracking, 150.0
          angle_weight: 120.0 # desired path tracking, 50.0
          velocity_feasibility_weight: 40.0 # smooth the optimized velocity command, 50.0
          obstacle_weight: 5.0 # avoid static obstacles in 2D costmap, 50.0

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: [ "simple_smoother" ]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

waypoint_follower:
  ros__parameters:
    odom_topic: /odom/current_pose
    target_list_topic: /perception/detection3d
    perception_state_topic: /pers/state
    localization_state_topic: /localization_state
    enable_perception_validation: False
    enable_localization_validation: True
    enable_relocalization_assistant: True
    force_relocalization_assistant: False
    states_validation_timeout: 15.0
    states_timeout_threshold: 2.0
    security_target_timeout: 10.0
    security_target_approach_distance: 1.5
    security_target_clipping_distance: 5.0
    loop_rate: 20
    stop_on_failure: True
    target_resp_min_dist: 1.0
    repeat_util_cancelled: False
    build_esdf_map: True
    build_quadtree_map: True
    behavior_tree:
      patrol: "navigate_through_poses_to_target.xml"
      patrol_unknown: "navigate_through_poses_to_target.xml"
      patrol_3d: "navigate_through_poses_to_target_3d.xml"
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "navigo_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 1

velocity_optimizer:
  ros__parameters:
    smoothing_frequency: 100.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    low_pass_filter_tau: 0.008
    max_positive_velocity: [ 4.0, 2.0, 3.0 ]
    min_negative_velocity: [ -4.0, -2.0, -3.0 ]
    min_positive_velocity: [ 0.1, 0.1, 0.0 ]
    max_negative_velocity: [ -0.1, -0.1, -0.0 ]
    max_accel: [ 1.5, 1.0, 2.0 ]
    max_decel: [ -2.5, -1.0, -2.0 ]
    odom_topic: "/odom/current_pose"
    odom_duration: 0.1
    deadband_velocity: [ 0.1, 0.1, 0.0 ]
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    use_sim_time: True
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    odom_topic: "/odom/current_pose"
    cmd_vel_in_topic: "cmd_vel_raw"
    cmd_vel_out_topic: "cmd_vel"
    transform_tolerance: 0.5
    source_timeout: 1.0
    base_shift_correction: False
    # Timer-driven publishing parameters
    publish_frequency: 100.0        # Output publishing frequency in Hz
    process_frequency: 10.0         # Collision detection processing frequency in Hz
    cmd_vel_in_timeout: 0.1         # Input timeout threshold in seconds (100ms)
    process_result_timeout: 0.2     # Process result age threshold in seconds (200ms)
    # Fine-grained STOP control based on collision prediction per velocity component
    selective_stop:
      # Global switch
      use_selective_stop: true
      filter_points_inside: true

      # Collision prediction parameters
      collision_prediction_time: 0.5    # Time horizon for collision prediction (seconds)
      simulation_time_step: 0.05        # Motion simulation time step (seconds)

      # Level 2 combination testing
      enable_level2_combinations: true  # Enable testing velocity combinations

      # Velocity comparison threshold
      velocity_tolerance: 0.01          # Tolerance for zero velocity comparison (m/s or rad/s)

    # Polygons represent zone around the robot for "stop" and "slowdown" action types,
    # and robot footprint for "approach" action type.
    # Footprint could be "polygon" type with dynamically set footprint from footprint_topic
    # or "circle" type with static footprint set by radius. "footprint_topic" parameter
    # to be ignored in circular case.
    polygons: [ "PolygonStop" ]
    PolygonStop:
      type: "polygon"
      points: [ 0.75, 0.38, 0.75, -0.38, -0.75, -0.38, -0.75, 0.38 ]
      action_type: "stop"
      max_points: 3
      visualize: True
      polygon_pub_topic: "/navigo/cm/cmn/vis/polygon_stop"
      enabled: True
    PolygonSlow:
      type: "polygon"
      points: [ 0.7, 0.575, 0.7, -0.575, -0.7, -0.575, -0.7, 0.575 ]
      action_type: "slowdown"
      max_points: 3
      slowdown_ratio: 0.3
      visualize: False
      polygon_pub_topic: "/navigo/cm/cmn/vis/polygon_slowdown"
      enabled: False
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/navigo/lcc/cmn/vis/published_footprint"
      time_before_collision: 2.0
      simulation_time_step: 0.1
      max_points: 5
      visualize: False
      enabled: False
    observation_sources: [ "scan" ]
    scan:
      type: "scan"
      topic: "/laser_scan"
      enabled: True
    pointcloud:
      type: "pointcloud"
      topic: "/intel_realsense_r200_depth/points"
      min_height: 0.1
      max_height: 0.5
      enabled: False
