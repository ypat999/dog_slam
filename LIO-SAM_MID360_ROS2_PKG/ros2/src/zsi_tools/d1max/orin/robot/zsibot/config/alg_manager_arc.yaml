      setup_script: /opt/robot/robot_arc/install/setup.bash
      cwd: null
      default_launch: true
    processor_config:
      name: arc_fsm
      enabled: true
      buffer_size: 1000
      batch_size: 10
      batch_timeout_ms: 100
      filters:
      - name: error_filter
        enabled: true
        filter_type: Regex
        params:
          pattern: component_container_isolated
          action: Pass
      storages:
      - name: arc_fsm
        enabled: true
        storage_type: File
        params:
          format: Text
          file_path: /tmp/zsibot/log/arc_state_machine_setup.log
  arc_apriltag_loc:
    launch_config:
      commands: ./bin/apriltag_localization_node
      envs:
        ROS_DOMAIN_ID: '24'
        RMW_IMPLEMENTATION: rmw_zenoh_cpp
        ROS_VERSION: humble
      env_file: null
      setup_script: null
      cwd: /opt/robot/robot_arc/install/apriltag_localization
      default_launch: true
    processor_config:
      name: localization_with_setup
      enabled: true
      buffer_size: 1000
      batch_size: 10
      batch_timeout_ms: 100
      filters:
      - name: error_filter
        enabled: true
        filter_type: Regex
        params:
          pattern: component_container_isolated
          action: Pass
      storages:
      - name: localization
        enabled: true
        storage_type: File
        params:
          file_path: /tmp/zsibot/log/arc_apriltag_loc_with_setup.log
          format: Text
  localization:
    launch_config:
      commands: ros2 launch localization localization.launch.py
      envs:
        ROS_VERSION: humble
        RMW_IMPLEMENTATION: rmw_zenoh_cpp
        ROS_DOMAIN_ID: '24'
        LOCALIZATION_YAML_DIR: /opt/robot/robot_localization/install/localization/share/localization/config/localization_params_fastlio.yaml
      env_file: null
      setup_script: /opt/robot/robot_localization/install/setup.bash
